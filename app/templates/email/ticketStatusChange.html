<!doctype html>
<html>
	<head>
		<style>
			body {
				font-family: 'Roboto', sans-serif;
				background-color: #f0f0f0;
				color: #333;
				margin: 0;
				padding: 0;
			}

			.email-content {
				background-color: #f9f9f9;
				color: #333;
				padding: 20px;
				display: block;
				width: 100%;
				margin: 0 auto;
				box-sizing: border-box;
			}

			.email-opener {
				font-size: 24px;
				font-weight: bold;
				margin-bottom: 10px;
				text-align: center;
			}

			.email-button {
				text-align: left;
				margin-bottom: 18px;
			}

			.email-button a {
				display: inline-block;
				padding: 8px 16px;
				background-color: #2f7de1;
				color: #ffffff;
				border: none;
				border-radius: 5px;
				font-size: 24px;
				text-decoration: none;
				margin-bottom: 10px;
			}

			.email-button a:hover {
				background-color: #2563eb;
			}

			.email-signoff {
				font-weight: bold;
			}

			.email-footer a {
				color: #2f7de1;
				text-decoration: none;
				display: inline-block;
			}

			.email-line {
				margin-bottom: 12px;
			}
		</style>
	</head>

	<body>
		<!--Table styling used as email templates do not support flexbox styling-->
		<table role="presentation" width="100%" class="wrapper" cellpadding="0" cellspacing="0" border="0">
			<tr>
				<td align="center">
					<table role="presentation" width="600" class="main-table" cellpadding="0" cellspacing="0" border="0">

						<tr>
							<td class="email-content">
								<div class="email-opener">Ticket Status Updated</div>

                                <div class="email-line">
									Hello,
								</div>

								<div class="email-line">
									The status of your ticket has changed.
								</div>

								<div class="email-line">
									<strong>Ticket:</strong> {{ ticket.ticketNumber }}
								</div>

								<div class="email-line">
									<strong>Subject:</strong> {{ ticket.subject }}
								</div>

								<div class="email-line">
									<strong>Previous Status:</strong> {{ oldStatus }}
								</div>

								<div class="email-line">
									<strong>New Status:</strong> {{ newStatus }}
								</div>

								<div class="email-button">
									<a href="{{ url_for('view_ticket', TicketID=ticket.TicketID, _external=True) }}">
										View Ticket
									</a>
								</div>
						

								<div class="email-line">
									Thank you,
								</div>

								<div class="email-signoff">
									Resolve Ticketing
								</div>
							</td>
						</tr>

						<tr>
							<td class="email-footer" align="center" style="padding-top: 12px;">
								<a href="{{ url_for('index', _external=True) }}">© 2026 Resolve Ticketing System</a>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
